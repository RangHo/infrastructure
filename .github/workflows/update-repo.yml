name: Update repository

on: [push, workflow_dispatch]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-butane:
    name: Build Butane configuration for Barista
    uses: ./.github/workflows/build-butane.yml
    with:
      basedir: barista
      bu: main
      ign: barista
    secrets: inherit

  build-static:
    name: Build static configuration for Roastery
    uses: ./.github/workflows/build-static.yml
    with:
      basedir: roastery
    secrets: inherit

  deploy-pages:
    name: Deploy the artifacts to GitHub Pages
    needs:
      - build-butane
      - build-static
    uses: ./.github/workflows/deploy-pages.yml
    secrets: inherit
